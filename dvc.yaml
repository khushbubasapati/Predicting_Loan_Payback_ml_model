stages:
  # STAGE 1: DATA INGESTION
  # Loads raw train.csv and test.csv, validates them, and saves to processed/
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
      - data/raw/train.csv
      - data/raw/test.csv
      - params.yaml
    params:
      - data_ingestion.train_path
      - data_ingestion.test_path
      - data_ingestion.target_column
      - data_ingestion.id_column
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  
  # STAGE 2: DATA PREPROCESSING
  # Feature/target split, cast categoricals to str, build grade order
  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - data/processed/train.csv
      - data/processed/test.csv
      - params.yaml
    params:
      - data_ingestion.target_column
      - data_ingestion.id_column
      - features.numeric
      - features.categorical
    outs:
      - data/processed/X_train.csv
      - data/processed/y_train.csv
      - data/processed/X_test.csv
      - data/processed/test_ids.csv
      - data/processed/grade_order.json

 
  # STAGE 3: MODEL TRAINING
  # Optuna hyperparameter tuning + train final model on X_tr
  model_training:
    cmd: python src/model_training.py
    deps:
      - src//model_training.py
      - data/processed/X_train.csv
      - data/processed/y_train.csv
      - data/processed/grade_order.json
      - params.yaml
    params:
      - features.numeric
      - features.categorical
      - model_training.n_trials
      - model_training.cv_folds
      - model_training.val_size
      - model_training.random_state
    outs:
      - model/model.pkl
      - data/processed/X_val.csv
      - data/processed/y_val.csv
    metrics:
      - model/model_metadata.json:
          cache: false

  
  # STAGE 4: MODEL EVALUATION
  # Calculate optimal threshold, generate classification report
  model_evaluation:
    cmd: python src/model_evaluation.py
    deps:
      - src/model_evaluation.py
      - model/model.pkl
      - data/processed/X_val.csv
      - data/processed/y_val.csv
      - params.yaml
    metrics:
      - reports/metrics.json:
          cache: false
      - reports/classification_report.json:
          cache: false